interface:
  display_name: "PPTPRO"
  short_description: "Create strict, balanced PPT decks with cover and preview QA"
  default_prompt: "Use PPTPRO strict mode to create a visually polished, source-aligned, editable PPT deck. If an existing template is provided, preserve its visual language and any locked/teammate slides; otherwise use a simple metadata cover with presentation date not duration and a final Thank You plus Questions or Questions & Discussion slide. Reuse original data figures when converting from a report or paper, create a slide recipe map and visual enrichment plan, use meaningful images/illustrations/diagrams/source-object visuals regularly for text-heavy decks, use softer rounded cards/callouts/panels unless the template requires square corners, consider traceable supporting images when useful, generate custom content visuals with the current latest built-in Codex/ChatGPT image tool when no real or traceable image fits, render previews, repair defects, and audit the revised range/final deck before handoff."
